name: Update flake.lock and packages

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Update packages
        env:
          NIX_PATH: nixpkgs=flake:nixpkgs
        run: |
          nix run nixpkgs#nix-update -- --flake comment-checker
          nix run nixpkgs#nix-update -- --flake rtk
          nix run nixpkgs#nix-update -- --flake _1mcp
          ./pkgs/vite-plus/update.sh

      - name: Update Caddy Hash
        run: |
          PKG_FILE=./pkgs/caddy-crowdsec.nix
          FAKE_HASH="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

          sed -i -E "s|hash = \"sha256-[A-Za-z0-9+/=]+\";|hash = \"$FAKE_HASH\";|" "$PKG_FILE"

          OUTPUT=$(nix build .#nixosConfigurations.plex-server.config.services.caddy.package --no-link --impure 2>&1 || true)
          NEW_HASH=$(echo "$OUTPUT" | grep -oP 'got:\s+\Ksha256-[A-Za-z0-9+/=]+')

          if [ -z "$NEW_HASH" ]; then
            echo "Failed to extract new hash. Build output:"
            echo "$OUTPUT"
            exit 1
          fi

          echo "New Caddy hash: $NEW_HASH"
          sed -i -E "s|hash = \"$FAKE_HASH\";|hash = \"$NEW_HASH\";|" "$PKG_FILE"

      - name: Verify hosts build
        run: |
          nix build .#nixosConfigurations.plex-server.config.system.build.toplevel --dry-run --impure

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(deps): auto-update flake.lock, packages, and caddy hash"
            git push
          fi

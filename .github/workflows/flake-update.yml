name: Update flake.lock and packages

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Update packages
        run: |
          nix run nixpkgs#nix-update -- --flake comment-checker
          nix run nixpkgs#nix-update -- --flake rtk
          nix run nixpkgs#nix-update -- --flake _1mcp
          ./pkgs/vite-plus/update.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(deps): auto-update flake.lock and packages"
            git push
          fi
